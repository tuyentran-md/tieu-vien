<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Audit — NPC ink figures</title>
<style>
  body { margin: 0; font-family: Georgia, serif; background: #ece5d5; }
  .row { display: flex; flex-wrap: wrap; gap: 6px; padding: 12px; }
  .cell { text-align: center; }
  .cell .label { font-size: 11px; color: #6b6353; margin-top: 2px; }
  .fig { width: 112px; height: 180px; background: linear-gradient(#ded6c2, #cfc4a6); border: 1px solid #b8ae92; overflow: hidden; }
  .fig img { width: 100%; height: 100%; object-fit: contain; }
  /* on top of the real painting for blend check */
  .onart { position: relative; height: 320px; margin: 12px;
    background: url("../assets/art/courtyard-master-clean-xuan.png") center bottom / cover; }
  .onart .npc { position: absolute; width: 74px; }
  .onart .npc img { width: 100%; height: auto; filter: drop-shadow(0 2px 2px rgba(45,39,28,.22)); }
</style>
</head>
<body>
<div class="row" id="grid"></div>
<div class="onart" id="onart"></div>
<script src="../ink/scene.js?v=2"></script>
<script>
  const roles = InkScene.FIGS;
  const grid = document.getElementById("grid");
  roles.forEach(r => {
    const fileRole = r === "traveler" ? "master" : r;
    const cell = document.createElement("div");
    cell.className = "cell";
    cell.innerHTML = '<div class="fig"><img src="../assets/art/fig/' + fileRole + '.png" alt=""></div><div class="label">' + r + "</div>";
    grid.appendChild(cell);
  });
  // blend check: place a few figures over the painting at yard positions
  const onart = document.getElementById("onart");
  [["boy", 24, 88], ["oldman", 40, 82], ["scholar", 55, 86], ["woman", 68, 90]].forEach(([r, x, y]) => {
    const d = document.createElement("div");
    d.className = "npc";
    d.style.left = x + "%";
    d.style.top = y + "%";
    d.style.transform = "translate(-50%,-100%)";
    d.innerHTML = '<img src="../assets/art/fig/' + r + '.png" alt="">';
    onart.appendChild(d);
  });
</script>
</body>
</html>
