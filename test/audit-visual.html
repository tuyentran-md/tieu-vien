<!DOCTYPE html>
<!-- Visual stage driver: ?stage=walk|glow|dialog|empty|epilogue -->
<html><head><meta charset="UTF-8"><style>
  body { margin: 0; } iframe { width: 100vw; height: 100vh; border: 0; display: block; }
</style></head>
<body><iframe id="f"></iframe>
<script>
const f = document.getElementById("f");
const step = ms => new Promise(r => setTimeout(r, ms));
const stage = new URLSearchParams(location.search).get("stage") || "walk";
async function main() {
  localStorage.removeItem("tieuvien_save_v1");
  const src = { empty: "/index.html?autoplay=47", epilogue: "/index.html?autoplay=48" }[stage] || "/index.html";
  await new Promise(r => { f.onload = r; f.src = src; });
  const d = () => f.contentDocument;
  if (stage === "walk" || stage === "glow" || stage === "dialog") {
    d().getElementById("btn-begin").click();
    await step(stage === "walk" ? 2300 : 5400);
  }
  if (stage === "dialog") {
    d().querySelector("#ink-npc").dispatchEvent(new f.contentWindow.MouseEvent("click", { bubbles: true }));
    await step(350);
    d().getElementById("scene").click();
    await step(250);
  }
  if (stage === "empty") await step(800);
  if (stage === "epilogue") await step(1200);
  document.title = "STAGED:" + stage;
}
main();
</script></body></html>
