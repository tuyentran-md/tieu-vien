<!DOCTYPE html><html><head><meta charset="UTF-8"></head><body>
<pre id="out"></pre>
<script src="../data/arcs.js"></script><script src="../data/events.js"></script><script src="../data/quotes.js"></script><script src="../data/epilogue.js"></script><script src="../core.js"></script>
<script>
const C = createCore({ ARCS, ARC_STARTS, SEASON_EVENTS, EMPTY_DAY, QUOTES, ITEMS, YARD_LINES, EPILOGUE });
const S = C.newState(); const log = [];
for (; S.day <= C.TOTAL_DAYS; S.day++) {
  const t = C.resolveNode(S, C.pickToday(S));
  S.beat = 0;
  let choices = 0;
  for (;;) {
    const vis = C.visibleChoices(S, t.node);
    choices += vis.length;
    if (!vis.length) throw new Error(`d${S.day} ${t.id}: no visible choice at beat ${S.beat}`);
    C.applyChoice(S, vis[0]);
    if (C.isFinalBeat(t.node, S)) break;
    S.beat += 1;
  }
  log.push(`d${S.day} ${t.id} visible choices=${choices}`);
}
log.push('EPILOGUE ' + C.epilogueParas(S).length + ' paras; ' + C.statsLine(S));
document.getElementById('out').textContent = log.join('\n');
</script></body></html>
