name: Deploy Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Assemble clean site
        run: |
          mkdir -p _site
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='_site' \
            --exclude='test' \
            --exclude='tools' \
            --exclude='assets/art/npc' \
            --include='assets/art/items/item-*.png' \
            --include='assets/art/items/fx-*.png' \
            --exclude='assets/art/items/*' \
            --exclude='DESIGN.md' \
            --exclude='SPEC.md' \
            --exclude='ART_PROMPTS.md' \
            --exclude='AUDIT_2026-07-05.md' \
            ./ _site/
          touch _site/.nojekyll
          echo "---- published files ----"
          find _site -maxdepth 2 -type f | sort
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
